<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Planner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-header">
    <div class="logo"><em>budget</em>planner</div>
    <div class="logo-sub">/ personal finance tool</div>
  </header>

  <div class="app">
    <aside class="sidebar fade-in">
      <section>
        <div class="section-label">Currency</div>
        <select id="currencySelect" class="currency-select" aria-label="Currency selector"></select>
        <div class="currency-note" id="currencyNote"></div>
      </section>

      <section>
        <div class="section-label">Income period</div>
        <div class="period-tabs" id="periodTabs" role="tablist" aria-label="Income period selector"></div>
      </section>

      <section>
        <label class="section-label" id="incomeLabel" for="incomeInput">Enter monthly income</label>
        <div class="income-input-wrap">
          <span class="income-prefix" id="incomePrefix" aria-hidden="true">$</span>
          <input
            type="number"
            class="income-input"
            id="incomeInput"
            min="0"
            step="1"
            inputmode="decimal"
            placeholder="3500"
          />
        </div>

        <input type="range" id="incomeSlider" min="0" max="30000" step="50" value="3500" aria-label="Income slider" />
        <div class="income-conversions" id="conversionChips"></div>
      </section>

      <section>
        <div class="section-label">Quick presets <span class="muted-small">(monthly)</span></div>
        <div class="preset-grid" id="presetGrid"></div>
      </section>

      <section>
        <div id="statusPill" class="status-pill status-ok" role="status">
          <span class="dot" aria-hidden="true"></span>
          <span id="statusText">—</span>
        </div>
      </section>

      <section class="tip-block">
        <div class="tip-title">★ Tips for your level</div>
        <div id="tipsContent"></div>
      </section>

      <button class="reset-btn" id="resetButton" type="button">↺ Reset to recommended</button>
    </aside>

    <main class="main fade-in">
      <section>
        <div class="section-label">Allocation overview</div>
        <div class="bar-wrap" id="stackedBar"></div>
        <div class="legend-row" id="legendRow"></div>
      </section>

      <section>
        <div class="snapshot-grid" id="snapshotGrid"></div>
      </section>

      <section>
        <div class="section-label">Adjust categories</div>
        <div class="groups" id="groups"></div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
